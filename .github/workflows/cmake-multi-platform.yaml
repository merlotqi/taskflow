name: Multi-Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: multi-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} (${{ matrix.compiler }})

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: llvm
          - os: macos-latest
            compiler: llvm

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build nlohmann-json3-dev
          if [ "${{ matrix.compiler }}" = "llvm" ]; then
            sudo apt-get install -y clang clang-tidy
          else
            sudo apt-get install -y g++
          fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja nlohmann-json

      - name: CMake search path for Homebrew nlohmann_json (macOS)
        if: runner.os == 'macOS'
        run: echo "CMAKE_PREFIX_PATH=$(brew --prefix nlohmann-json)" >> "$GITHUB_ENV"

      - name: Select compiler
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ] && [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          fi

      - name: Configure CMake
        run: |
          cmake -B "${{ github.workspace }}/build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DTASKFLOW_BUILD_EXAMPLES=ON

      - name: Run clang-tidy (Linux, LLVM only)
        if: runner.os == 'Linux' && matrix.compiler == 'llvm'
        run: |
          run-clang-tidy -p "${{ github.workspace }}/build" -header-filter='include/taskflow/.*'

      - name: Build
        run: cmake --build "${{ github.workspace }}/build" --parallel

      - name: CTest (examples + any registered tests)
        working-directory: ${{ github.workspace }}/build
        run: ctest --output-on-failure
