name: C++ CI (Lint & Build)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy cmake ninja-build nlohmann-json3-dev

      - name: Configure CMake
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DTASKFLOW_BUILD_EXAMPLES=ON

      - name: Run clang-tidy
        run: |
          run-clang-tidy -p build/ -header-filter='include/taskflow/.*'

      - name: Build
        run: cmake --build build

      - name: CTest (examples + any registered tests)
        working-directory: build
        run: ctest --output-on-failure
